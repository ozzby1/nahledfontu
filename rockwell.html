
<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Náhled fontu</title>
  <style>
    @font-face {
      font-family: 'Rockwell';
      src: url('https://raw.githubusercontent.com/ozzby1/nahledfontu/main/fonts/rockwell.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      overflow: hidden;
      background: #ffffff;
      color: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    body {
      padding: 20px;
    }

    .label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 8px;
    }

    .input-wrapper {
      margin-bottom: 20px;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      font-size: 15px;
      font-family: inherit;
      color: #1a1a1a;
      background: #ffffff;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      outline: none;
      transition: border-color 0.2s ease;
    }

    input[type="text"]:focus {
      border-color: #aaa;
    }

    input[type="text"]::placeholder {
      color: #bbb;
    }

    .preview-box {
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      padding: 20px 24px;
      background: #ffffff;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .preview-text {
      font-family: 'Rockwell', serif;
      font-size: 48px;
      color: #1a1a1a;
      text-align: center;
      line-height: 1.4;
      word-break: break-word;
      width: 100%;
    }

    .placeholder-hint {
      font-size: 13px;
      color: #ccc;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>

  <div class="input-wrapper">
    <div class="label">Váš text</div>
    <input
      type="text"
      id="textInput"
      placeholder="Napište slovo nebo větu…"
      maxlength="80"
      autocomplete="off"
    />
  </div>

  <div>
    <div class="label">Náhled</div>
    <div class="preview-box" id="previewBox">
      <span class="placeholder-hint" id="hint">Váš text se zobrazí zde</span>
      <span class="preview-text" id="previewText" style="display:none;"></span>
    </div>
  </div>

  <script>
    const input = document.getElementById('textInput');
    const previewText = document.getElementById('previewText');
    const hint = document.getElementById('hint');

    input.addEventListener('input', () => {
      const val = input.value.trim();
      if (val.length > 0) {
        previewText.textContent = input.value;
        previewText.style.display = 'block';
        hint.style.display = 'none';
      } else {
        previewText.style.display = 'none';
        hint.style.display = 'block';
      }
    });
  </script>

</body>
</html>
